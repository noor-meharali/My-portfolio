<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Noor Ali — Front-End Developer building immersive digital experiences with modern web technologies." />
    <meta name="theme-color" content="#08090f" />
    <title>Noor Ali · Front-End Developer</title>
    <script>
      // Applied before first paint so the theme toggle survives a reload
      // without a flash of the wrong theme. Dark is the default brand look.
      (function () {
        try {
          if (localStorage.getItem("theme") === "light") {
            document.documentElement.setAttribute("data-theme", "light");
          }
        } catch (e) {
          /* localStorage unavailable — fall back to the dark default */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
